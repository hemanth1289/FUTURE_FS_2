# render.yaml — Deploy LeadFlow CRM on Render.com
# Docs: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: leadflow-crm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: changeme
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/data/leads.db
    disk:
      name: db
      mountPath: /opt/render/project/data
      sizeGB: 1

