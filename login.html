{% extends "base.html" %}
{% block title %}Admin Login — LeadFlow CRM{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Logo + heading -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-600 text-white mb-4 shadow-lg">
        <svg class="w-7 h-7" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
      <p class="text-slate-500 text-sm mt-1">Sign in to your CRM dashboard</p>
    </div>

    <!-- Login card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form method="POST" action="{{ url_for('login') }}">

        <!-- Username -->
        <div class="mb-4">
          <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">
            Username
          </label>
          <input
            type="text" id="username" name="username"
            placeholder="admin"
            autocomplete="username"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400 transition"
            required
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">
            Password
          </label>
          <input
            type="password" id="password" name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400 transition"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold
                 py-3 px-6 rounded-xl transition-colors text-sm tracking-wide"
        >
          Sign In →
        </button>

      </form>
    </div>

    <!-- Dev hint (remove in production) -->
    <div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700 text-center">
      <strong>Dev defaults:</strong> username <code class="font-mono">admin</code> / password <code class="font-mono">admin123</code><br/>
      Set <code class="font-mono">ADMIN_USERNAME</code> &amp; <code class="font-mono">ADMIN_PASSWORD</code> in <code class="font-mono">.env</code> for production.
    </div>

  </div>
</div>
{% endblock %}
