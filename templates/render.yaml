# render.yaml — Deploy LeadFlow CRM on Render.com
# Docs: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: leadflow-crm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: ADMIN_USERNAME
        value: admin                 # Change this in the Render dashboard
      - key: ADMIN_PASSWORD
        value: changeme              # Change this in the Render dashboard
    disk:
      name: db
      mountPath: /opt/render/project/src
      sizeGB: 1                      # SQLite lives here — persists across deploys
