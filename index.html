{% extends "base.html" %}
{% block title %}Submit a Lead — LeadFlow CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-16">

  <!-- Hero text -->
  <div class="text-center mb-10">
    <span class="inline-block bg-brand-50 text-brand-600 text-xs font-semibold px-3 py-1 rounded-full mb-3 tracking-wide uppercase">
      Get in touch
    </span>
    <h1 class="text-4xl font-bold text-slate-900 mb-3">Let's Talk Business</h1>
    <p class="text-slate-500 text-lg">Fill in your details and our team will reach out within 24 hours.</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <form method="POST" action="{{ url_for('index') }}" novalidate>

      <!-- Name + Email (side-by-side on desktop) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">

        <!-- Name -->
        <div>
          <label for="name" class="block text-sm font-semibold text-slate-700 mb-1.5">
            Full Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text" id="name" name="name"
            value="{{ name or '' }}"
            placeholder="Jane Smith"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400 transition"
            required
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">
            Email Address <span class="text-red-500">*</span>
          </label>
          <input
            type="email" id="email" name="email"
            value="{{ email or '' }}"
            placeholder="jane@company.com"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400 transition"
            required
          />
        </div>
      </div>

      <!-- Phone + Source -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">

        <!-- Phone -->
        <div>
          <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1.5">
            Phone Number
          </label>
          <input
            type="tel" id="phone" name="phone"
            value="{{ phone or '' }}"
            placeholder="+1 (555) 000-0000"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400 transition"
          />
        </div>

        <!-- Source -->
        <div>
          <label for="source" class="block text-sm font-semibold text-slate-700 mb-1.5">
            How did you find us?
          </label>
          <select
            id="source" name="source"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   text-slate-700 transition"
          >
            <option value="">— Select source —</option>
            {% for opt in ['Website', 'Referral', 'Social Media', 'Google', 'LinkedIn', 'Email Campaign', 'Other'] %}
            <option value="{{ opt }}" {% if source == opt %}selected{% endif %}>{{ opt }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Message -->
      <div class="mb-6">
        <label for="message" class="block text-sm font-semibold text-slate-700 mb-1.5">
          Message
        </label>
        <textarea
          id="message" name="message" rows="4"
          placeholder="Tell us a bit about what you need..."
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm resize-none
                 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                 placeholder:text-slate-400 transition"
        >{{ message or '' }}</textarea>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-6
               rounded-xl transition-colors text-sm tracking-wide"
      >
        Send My Details →
      </button>

    </form>
  </div>

  <!-- Admin hint -->
  <p class="text-center text-slate-400 text-xs mt-6">
    Are you an admin?
    <a href="{{ url_for('login') }}" class="text-brand-500 hover:underline">Log in to the dashboard</a>
  </p>

</div>
{% endblock %}
